openapi: 3.0.3
info:
  title: Api
  version: 1.1.0
  description: Outlook to Google Calendar Sync API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile
  - name: outlook
    description: Outlook calendar operations
  - name: google
    description: Google calendar operations
  - name: settings
    description: Sync settings
  - name: sync
    description: Sync operations
  - name: logs
    description: Sync logs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile and connection status
      responses:
        "200":
          description: Profile info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profile/outlook/connect:
    post:
      operationId: connectOutlook
      tags: [outlook]
      summary: Connect Outlook by providing a profile file path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutlookConnection"
      responses:
        "204":
          description: Connected

  /profile/outlook/calendars:
    get:
      operationId: getOutlookCalendars
      tags: [outlook]
      summary: List Outlook mailbox calendars
      responses:
        "200":
          description: Outlook calendars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarRef"

  /profile/outlook/calendar:
    put:
      operationId: setOutlookCalendar
      tags: [outlook]
      summary: Select default Outlook calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarSelection"
      responses:
        "204":
          description: Updated

  /profile/google/calendars:
    get:
      operationId: getGoogleCalendars
      tags: [google]
      summary: List Google calendars
      responses:
        "200":
          description: Google calendars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarRef"

  /profile/google/calendar:
    put:
      operationId: setGoogleCalendar
      tags: [google]
      summary: Select target Google calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarSelection"
      responses:
        "204":
          description: Updated

  /profile/google/disconnect:
    delete:
      operationId: disconnectGoogle
      tags: [google]
      summary: Disconnect Google account and clear destination calendar
      responses:
        "204":
          description: Disconnected

  /profile/outlook/disconnect:
    delete:
      operationId: disconnectOutlook
      tags: [outlook]
      summary: Clear Outlook profile path and source calendar selection
      responses:
        "204":
          description: Disconnected

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get sync settings
      responses:
        "200":
          description: Sync settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update sync settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncSettings"
      responses:
        "204":
          description: Updated

  /sync/run:
    post:
      operationId: triggerSync
      tags: [sync]
      summary: Trigger sync manually
      responses:
        "200":
          description: Sync run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRun"

  /logs:
    get:
      operationId: getLogs
      tags: [logs]
      summary: List past sync runs (paged and filterable)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyncRunStatus"
      responses:
        "200":
          description: Paged sync logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedSyncRuns"

  /logs/{runId}:
    get:
      operationId: getLogDetails
      tags: [logs]
      summary: Get full log details for a sync run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full sync run log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncRunDetails"

components:
  schemas:
    SyncRunStatus:
      type: string
      enum: [RUNNING, SUCCESS, FAILED]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Profile:
      type: object
      properties:
        googleConnected:
          type: boolean
        outlookConnected:
          type: boolean
        outlookProfilePath:
          type: string
        outlookCalendarId:
          type: string
        outlookCalendarName:
          type: string
        googleCalendarId:
          type: string
        googleCalendarName:
          type: string
        syncRunning:
          type: boolean
      required:
        - googleConnected
        - outlookConnected
        - syncRunning

    OutlookConnection:
      type: object
      properties:
        profilePath:
          type: string
      required:
        - profilePath

    CalendarRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        timeZone:
          type: string
        color:
          type: string
      required:
        - id
        - name

    CalendarSelection:
      type: object
      properties:
        calendarId:
          type: string
      required:
        - calendarId

    SyncSettings:
      type: object
      properties:
        frequencyMinutes:
          type: integer
          minimum: 1
        daysPast:
          type: integer
          minimum: 0
        daysFuture:
          type: integer
          minimum: 0
        debugLogging:
          type: boolean
        syncColorLabels:
          type: boolean
          description: "Mirror Outlook category colors to Google Calendar event colors"
      required:
        - frequencyMinutes
        - daysPast
        - daysFuture
        - debugLogging
        - syncColorLabels

    SyncRun:
      type: object
      properties:
        id:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/SyncRunStatus"
        created:
          type: integer
        updated:
          type: integer
        deleted:
          type: integer
        message:
          type: string
      required:
        - id
        - startedAt
        - status

    PagedSyncRuns:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/SyncRun"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages

    SyncRunDetails:
      type: object
      properties:
        run:
          $ref: "#/components/schemas/SyncRun"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
      required:
        - run
        - entries

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          $ref: '#/components/schemas/LogLevel'
        message:
          type: string
      required:
        - timestamp
        - level
        - message

    LogLevel:
      type: string
      enum: [INFO, DEBUG, WARN, ERROR]
